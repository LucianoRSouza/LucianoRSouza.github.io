<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luciano Rodrigues | AI-Driven Procurement Leader & Strategic Operations</title>
    
    <!-- FONTS - SEM ESPAÇOS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FONT AWESOME - SEM ESPAÇO NO FINAL -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Todo o seu CSS aqui - removi o CSS que estava solto fora do style */
        :root {
            --navy: #0f1538;
            --navy-light: #1a2344;
            --gold: #d4af37;
            --gold-light: #e5c158;
            --cream: #f8f6f0;
            --text: #2c3e50;
            --text-light: #5a6c7d;
            --white: #ffffff;
            --accent: #ff6b6b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: var(--text); 
            background: var(--cream); 
            line-height: 1.6; 
            overflow-x: hidden;
        }
        
        /* ... (todo o resto do CSS que você já tem) ... */
        
        @media (max-width: 968px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; }
            .hero-content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .about-grid { grid-template-columns: 1fr; }
            .timeline-item { grid-template-columns: 1fr; }
            .timeline-item::before { display: none; }
            .timeline-content { margin-left: 0; }
            .timeline-content::before { display: none; }
            .framework-highlight { grid-template-columns: 1fr; }
            .contact-grid { grid-template-columns: 1fr; }
            .ml-metrics { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <!-- CONTEÚDO HTML AQUI -->
    <div class="loading" id="loading">
        <div class="loading-logo">LR.</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <!-- ... resto do seu HTML ... -->
    
    <!-- SCRIPTS NO FINAL -->
    <script>
        // Loading screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        });

        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Language switcher
        function changeLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            console.log('Language: ' + lang);
        }

        // Gallery tabs
        function switchGallery(gallery) {
            document.querySelectorAll('.gallery-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.querySelectorAll('.gallery-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById('gallery-' + gallery).classList.add('active');
        }

        // Lightbox
        function openLightbox(element) {
            const img = element.querySelector('img');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            if (lightbox && lightboxImg && img) {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            }
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            if (lightbox) {
                lightbox.classList.remove('active');
            }
        }

        // Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Scroll animations
        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach((el) => observer.observe(el));

        // Scroll to top
        const scrollTop = document.getElementById('scrollTop');
        if (scrollTop) {
            window.addEventListener('scroll', function() {
                if (window.scrollY > 500) {
                    scrollTop.classList.add('visible');
                } else {
                    scrollTop.classList.remove('visible');
                }
            });

            scrollTop.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // Stat detail
        function showStatDetail(stat) {
            const messages = {
                'savings': '€1M+ in cost savings achieved through AI-powered contract analysis',
                'experience': '15+ years of progressive leadership in procurement',
                'projects': '$10M+ in project value managed across EU and Asia',
                'countries': 'Experience across 20+ countries'
            };
            alert(messages[stat]);
        }
    </script>
</body>
</html>
